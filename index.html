<!DOCTYPE html>
<html>
    <head>
        <title>Machine Test - Solutions</title>
        <link rel="stylesheet" href="css/style.css">
    </head>
    <body>
        <h2>Question 2: Debounce Function</h2>
        <div>
            <button id="debounce-btn">Click Me quickly!</button>
            <p>Debounced executions: <span id="debounce-count">0</span></p>
        </div>

        <hr>

        <h2>Question 3: Find Missing Number in Sequence</h2>
        <div>
            <p>Array 1: <code>[3,7,1,2,8,4,5]</code></p>
            <p>Array 2: <code>[1,2,4,5,6]</code></p>
            <button id="find-missing-btn">Find Missing Numbers</button>
            <p>Array 1 missing number: <strong id="missing-num-1"></strong></p>
            <p>Array 2 missing number: <strong id="missing-num-2"></strong></p>
        </div>

        <h2>Question 4: Modify User List</h2>
        <div>
            <button id="add-user-btn">Add "David"</button>
            <button id="remove-user-btn">Remove First User</button>
        </div>

        <div id="user-list">
            <ul>
                <li>Alice</li>
                <li>Bob</li>
                <li>Charlie</li>
            </ul>
        </div>

        <hr>

        <h2>Question 5: Form Validation</h2>
        <form action="" id="login-form">
            <input type="text" id="username" placeholder="Enter username"/>
            <input type="password" id="password" placeholder="Enter password"/>
<button type="submit">Login</button>
        </form>
        <div id="error-message"></div>
        <script src="js/questions.js"></script>
    </body>
</html>
